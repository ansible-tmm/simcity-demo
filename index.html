 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps City</title>
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/jquery-3.6.3.min.js"></script>
    <script src="assets/three.umd.min.js"></script>
    <script src="assets/data.js"></script>
    <script src="assets/splunk-logo-data.js"></script>
    <script src="assets/city.js"></script>
    <script src="assets/script.js"></script>
</head>
<body>
    <div id="aspect-ratio-container">
        <div id="city-container"></div>

        <div id="section-bg-layer" class="section-bg-layer">
            <div id="section-bg-image"></div>
        </div>

        <div class="image-overlay" id="image-overlay"></div>
        <div id="overlay-close-btn" aria-label="Close">&times;</div>
        <div id="hotspot-container"></div>

        <div id="aiops-header">
            <img src="assets/images/ansible-icon.png" class="aiops-icon" alt="">
            <span class="aiops-title">AIOps</span>
            <span class="aiops-divider">|</span>
            <span class="aiops-subtitle">Turn operational insight into intelligent, automated outcomes.</span>
        </div>

        <div id="mainContent">
            <div id="landingPage">
                <div id="crawl" class="landingPageOption"><span>Crawl</span></div>
                <div id="walk" class="landingPageOption"><span>Walk</span></div>
                <div id="run" class="landingPageOption"><span>Run</span></div>
                <div id="go-fullscreen"></div>
            </div>
            <div id="landing-bottom-bar">
                <div id="partners-btn">Partners</div>
                <div id="compass-btn" title="Reset view">
                    <svg viewBox="0 0 48 48" width="48" height="48">
                        <circle cx="24" cy="24" r="22" fill="rgba(10,15,30,0.7)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
                        <polygon class="compass-north" points="24,6 28,22 24,19 20,22" fill="#ef4444" opacity="0.9"/>
                        <polygon class="compass-south" points="24,42 20,26 24,29 28,26" fill="rgba(255,255,255,0.5)"/>
                        <circle cx="24" cy="24" r="3" fill="rgba(255,255,255,0.8)"/>
                        <text x="24" y="5" text-anchor="middle" fill="#ef4444" font-size="7" font-weight="800" font-family="system-ui,sans-serif">N</text>
                    </svg>
                </div>
            </div>

            <div id="partner-heading"></div>
            <div id="partner-menu" class="hidden">
                <div id="partner-menu-items"></div>
            </div>
        </div>

        <div id="flip-menu"></div>
        <div id="page-heading"></div>

        <div id="main-menu"></div>

        <div id="bottom-menu">
            <div id="btnHome" class="bottom-menu-button"></div>
        </div>
    </div>
</body>
</html>
